name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile
        run: python -m compileall -q app.py adaptive.py analytics.py expansion ui tests
      - name: Test with branch coverage
        run: |
          python -m coverage run -m unittest discover -v
          python -m coverage report
      - name: Headless Streamlit health check
        run: |
          streamlit run app.py --server.headless true --server.port 8501 > streamlit.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8501/_stcore/health; then
              exit 0
            fi
            sleep 1
          done
          cat streamlit.log
          exit 1
